<!DOCTYPE html>
<html>
<head>
    <title>Client Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Welcome, {{ request.user.first_name }}</h2>
    <p class="text-muted">Client Dashboard</p>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>My Profile</h5>
                    <p>View account information</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>My Properties</h5>
                    <p>View assigned properties</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>My Payments</h5>
                    <p>View payment history</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
