<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">Property Management Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Properties</h5>
                <h2>0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Units</h5>
                <h2>0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Occupied Units</h5>
                <h2>0</h2>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="{% url 'add_property' %}" class="btn btn-primary">
            Add Property
        </a>
    </div>

</div>

</body>
</html>
