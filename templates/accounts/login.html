{% extends 'base.html' %}

{% block title %}Sign in{% endblock %}

{% block css %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340;9..144,480;9..144,600&family=Inter:wght@400;500;600&display=swap');

    :root {
        --navy: #0F1B2A;
        --navy-deep: #0A131E;
        --grid-line: rgba(201, 161, 90, 0.10);
        --brass: #C9A15A;
        --brass-soft: #E4C98A;
        --cream: #F6F3EC;
        --slate: #64758A;
        --ink: #1B2530;
        --terracotta: #B85C38;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        height: 100%;
        font-family: 'Inter', Arial, sans-serif;
    }

    .login-backdrop {
        position: relative;
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        overflow: hidden;
        background-color: var(--navy-deep);
        background-image:
            linear-gradient(160deg, rgba(10,19,30,0.90) 0%, rgba(15,27,42,0.74) 55%, rgba(10,19,30,0.92) 100%),
            repeating-linear-gradient(0deg, var(--grid-line) 0 1px, transparent 1px 32px),
            repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 32px),
            url('/static/images/login-bg.png');
        background-size: cover, 32px 32px, 32px 32px, cover;
        background-position: center, center, center, center;
        background-repeat: no-repeat, repeat, repeat, no-repeat;
    }

    .eyebrow {
        position: absolute;
        top: 32px;
        left: 40px;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--brass-soft);
        font-weight: 500;
        z-index: 2;
    }

    /* CENTERED CARD */
    .login-card-outer {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 380px;
        background: var(--cream);
        border-radius: 14px;
        padding: 44px 40px 40px;
        box-shadow: 0 30px 70px -20px rgba(10,19,30,0.55);
    }

    .brand-content {
        position: relative;
        text-align: center;
        margin-bottom: 26px;
    }

   
    .building-art {
        width: 92px;
        height: 92px;
        margin: 0 auto 16px;
    }

    .building-art rect.frame { fill: none; stroke: rgba(27,37,48,0.35); stroke-width: 1.5; }
    .building-art rect.window {
        fill: rgba(27,37,48,0.05);
        stroke: rgba(27,37,48,0.4);
        stroke-width: 1;
        animation: lightUp 5s ease-in-out infinite;
    }
    .building-art line { stroke: rgba(27,37,48,0.35); stroke-width: 1.5; }
    .building-art .window:nth-child(3) { animation-delay: 0.2s; }
    .building-art .window:nth-child(4) { animation-delay: 1.1s; }
    .building-art .window:nth-child(5) { animation-delay: 2.4s; }
    .building-art .window:nth-child(6) { animation-delay: 0.7s; }
    .building-art .window:nth-child(7) { animation-delay: 3.1s; }
    .building-art .window:nth-child(8) { animation-delay: 1.8s; }
    .building-art .window:nth-child(9) { animation-delay: 3.8s; }
    .building-art .window:nth-child(10) { animation-delay: 0.4s; }
    .building-art .window:nth-child(11) { animation-delay: 2.9s; }

    @keyframes lightUp {
        0%, 55%, 100% { fill: rgba(27,37,48,0.05); stroke: rgba(27,37,48,0.4); }
        70%, 90% { fill: var(--brass); stroke: #A97F3D; }
    }

    .brand-title {
        font-family: 'Fraunces', serif;
        font-size: 22px;
        font-weight: 480;
        letter-spacing: 0.01em;
        color: var(--ink);
        margin-bottom: 10px;
    }

    .brand-rule {
        width: 36px;
        height: 1px;
        background: var(--brass);
        margin: 0 auto 12px;
    }

    .brand-text {
        font-size: 13px;
        line-height: 1.6;
        color: var(--slate);
    }

    .login-card h2 {
        font-family: 'Fraunces', serif;
        font-weight: 480;
        font-size: 24px;
        color: var(--ink);
        margin: 0 0 4px;
        text-align: center;
    }

    .subtitle {
        font-size: 13px;
        color: var(--slate);
        margin-bottom: 28px;
        text-align: center;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--slate);
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 10px 2px;
        border: none;
        border-bottom: 1.5px solid #D8D2C4;
        background: transparent;
        outline: none;
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        color: var(--ink);
        border-radius: 0;
        transition: border-color 0.2s ease;
    }

    .form-group input::placeholder { color: #B7B1A2; }

    .form-group input:focus {
        border-color: var(--brass);
    }

    .login-btn {
        width: 100%;
        padding: 13px;
        background: var(--navy);
        color: var(--cream);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.02em;
        margin-top: 10px;
        transition: background 0.2s ease;
    }

    .login-btn:hover {
        background: var(--terracotta);
    }

    .error {
        color: var(--terracotta);
        font-size: 13px;
        margin-bottom: 18px;
        padding: 10px 12px;
        background: rgba(184, 92, 56, 0.08);
        border-left: 2px solid var(--terracotta);
    }

    @media (max-width: 480px) {
        .login-backdrop { padding: 16px; }
        .login-card-outer { padding: 36px 26px 30px; border-radius: 10px; }
        .eyebrow { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
        .building-art .window { animation: none; }
    }
</style>
{% endblock %}

{% block content %}

<div class="login-backdrop">

    <div class="eyebrow">Residential &middot; Commercial &middot; Mixed-use</div>

    <div class="login-card-outer">

        <div class="login-card">

            <div class="brand-content">

                <svg class="building-art" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a building elevation with lit windows">
                    <rect class="frame" x="30" y="40" width="140" height="140" />
                    <rect class="frame" x="30" y="40" width="140" height="20" fill="rgba(27,37,48,0.03)" />
                    <line x1="90" y1="180" x2="90" y2="150" />
                    <line x1="110" y1="180" x2="110" y2="150" />
                    <rect class="window" x="46" y="76" width="22" height="22" />
                    <rect class="window" x="89" y="76" width="22" height="22" />
                    <rect class="window" x="132" y="76" width="22" height="22" />
                    <rect class="window" x="46" y="112" width="22" height="22" />
                    <rect class="window" x="89" y="112" width="22" height="22" />
                    <rect class="window" x="132" y="112" width="22" height="22" />
                    <rect class="window" x="46" y="148" width="22" height="18" />
                    <rect class="window" x="132" y="148" width="22" height="18" />
                    <rect x="89" y="148" width="22" height="4" fill="rgba(27,37,48,0.25)" stroke="none" />
                </svg>
 <h2>AVC Consultants-U Ltd.</h2>
            <div class="subtitle">Sign in to your account to continue</div>

            </div>

           
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button class="login-btn" type="submit">
                    Login
                </button>

                <button class="login-btn" type="submit">
                    <a href="{% url 'register' %}">
        Register an account!
                    </a>
                </button>
            </form>

          
    
        </div>

    </div>

</div>

{% endblock %}
