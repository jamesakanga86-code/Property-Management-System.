<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">
            Preferred Move-in Date
        </label>

        {{ form.move_in_date }}

    </div>

    <div class="mb-3">

        <label class="form-label">
            Phone Number
        </label>

        {{ form.phone_number }}

    </div>

    <div class="mb-3">

        <label class="form-label">
            National ID (Optional)
        </label>

        {{ form.national_id }}

        <small class="text-muted">
            Leave blank if you don't wish to provide it now.
        </small>

    </div>

    <div class="mb-4">

        <label class="form-label">
            Message to the Property Manager
        </label>

        {{ form.message }}

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Submit Application

    </button>

    <a href="{% url 'property_detail' property.id %}"
       class="btn btn-secondary">

        Cancel

    </a>

</form>
